name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: codeberg-medium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" manifest.json manifest.firefox.json

      - name: Build packages
        run: bash build.sh

      - name: Remove unsigned XPI
        run: rm -f dist/haiilo-enhancer-firefox.xpi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sign Firefox extension
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          set +e
          npx --yes web-ext sign \
            --source-dir dist/firefox \
            --artifacts-dir dist \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --channel listed \
            --timeout 900000 2>&1 | tee /tmp/web-ext-out.txt
          EXIT=${PIPESTATUS[0]}
          set -e

          if [ $EXIT -ne 0 ]; then
            if grep -q "already exists" /tmp/web-ext-out.txt; then
              echo "Version already signed on AMO — downloading existing XPI..."
              python3 .forgejo/amo_download.py
            elif grep -q "approval" /tmp/web-ext-out.txt; then
              echo "Extension is pending AMO review — downloading XPI via API..."
              python3 .forgejo/amo_download.py
            else
              exit $EXIT
            fi
          fi

      - name: Upload & Publish to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
        run: |
          npx --yes --package=chrome-webstore-upload-cli chrome-webstore-upload \
            --source dist/haiilo-enhancer-chrome.zip \
            --extension-id "inaciekpbcbhkboeoopdkoimkmiajfie"

      - name: Publish release
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          IS_PRE=false
          [[ "$TAG" == *"-"* ]] && IS_PRE=true

          # Wait briefly for AMO to finish processing after download
          sleep 5

          # Verify we have an XPI before publishing
          SIGNED_XPI=$(find dist -maxdepth 1 -name "*.xpi" | head -1)
          if [ -z "$SIGNED_XPI" ]; then
            echo "ERROR: No signed XPI found in dist/"
            exit 1
          fi
          echo "Found signed XPI: $SIGNED_XPI"

          RELEASE=$(curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"prerelease\":${IS_PRE}}")

          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')

          curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=haiilo-enhancer-chrome.zip" \
            --data-binary @dist/haiilo-enhancer-chrome.zip

          curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=haiilo-enhancer-firefox.xpi" \
            --data-binary @"$SIGNED_XPI"
