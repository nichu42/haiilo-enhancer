name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: codeberg-medium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" manifest.json manifest.firefox.json

      - name: Build packages
        run: bash build.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sign Firefox extension
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          set +e
          npx --yes web-ext sign \
            --source-dir dist/firefox \
            --artifacts-dir dist \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --channel unlisted \
            --timeout 900000 2>&1 | tee /tmp/web-ext-out.txt
          EXIT=${PIPESTATUS[0]}
          set -e

          if [ $EXIT -ne 0 ]; then
            if grep -q "already exists" /tmp/web-ext-out.txt; then
              echo "Version already signed on AMO — downloading existing XPI..."
              python3 - <<'PYEOF'
import hmac, hashlib, base64, json, time, uuid, os, urllib.request

def b64url(data):
    if isinstance(data, str): data = data.encode()
    return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

iss = os.environ['AMO_JWT_ISSUER']
sec = os.environ['AMO_JWT_SECRET']
header = b64url(json.dumps({'alg': 'HS256', 'typ': 'JWT'}))
now = int(time.time())
payload = b64url(json.dumps({'iss': iss, 'jti': str(uuid.uuid4()), 'iat': now, 'exp': now + 300}))
sig = b64url(hmac.new(sec.encode(), f'{header}.{payload}'.encode(), hashlib.sha256).digest())
token = f'{header}.{payload}.{sig}'

manifest = json.load(open('dist/firefox/manifest.json'))
gecko_id = manifest['browser_specific_settings']['gecko']['id']
version = manifest['version']

req = urllib.request.Request(
    f'https://addons.mozilla.org/api/v5/addons/addon/{gecko_id}/versions/?filter=all_with_unlisted',
    headers={'Authorization': f'JWT {token}'}
)
data = json.loads(urllib.request.urlopen(req).read())
match = next((r for r in data['results'] if r['version'] == version), None)
if not match or not match['files']:
    raise RuntimeError(f'No signed files for version {version} on AMO')

url = match['files'][0]['url']
out = f'dist/haiilo_enhancer-{version}.xpi'
req2 = urllib.request.Request(url, headers={'Authorization': f'JWT {token}'})
with urllib.request.urlopen(req2) as resp, open(out, 'wb') as f:
    f.write(resp.read())
print(f'Downloaded {out}')
PYEOF
            else
              exit $EXIT
            fi
          fi

      - name: Publish release
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          IS_PRE=false
          [[ "$TAG" == *"-"* ]] && IS_PRE=true

          RELEASE=$(curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"prerelease\":${IS_PRE}}")

          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')

          curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=haiilo-enhancer-chrome.zip" \
            --data-binary @dist/haiilo-enhancer-chrome.zip

          SIGNED_XPI=$(find dist -maxdepth 1 -name "*.xpi" | head -1)
          curl -sf -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=haiilo-enhancer-firefox.xpi" \
            --data-binary @"$SIGNED_XPI"
