<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons for Hush for Haiilo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .icon-row { margin-bottom: 20px; }
    a { display: inline-block; margin: 5px; padding: 8px 16px; background: #4f46e5; color: white; text-decoration: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Icon Generator</h1>
  <p>Right-click on each canvas and "Save image as..." to save the PNG files.</p>

  <div class="icon-row">
    <h3>16x16</h3>
    <canvas id="icon16" width="16" height="16"></canvas>
    <a href="#" id="dl16">Download icon16.png</a>
  </div>

  <div class="icon-row">
    <h3>32x32</h3>
    <canvas id="icon32" width="32" height="32"></canvas>
    <a href="#" id="dl32">Download icon32.png</a>
  </div>

  <div class="icon-row">
    <h3>48x48</h3>
    <canvas id="icon48" width="48" height="48"></canvas>
    <a href="#" id="dl48">Download icon48.png</a>
  </div>

  <div class="icon-row">
    <h3>128x128</h3>
    <canvas id="icon128" width="128" height="128"></canvas>
    <a href="#" id="dl128">Download icon128.png</a>
  </div>

  <script>
    function drawIcon(ctx, size) {
      const scale = size / 128;

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(1, '#4f46e5');

      // Background circle
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 2*scale, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();

      // Finger (vertical rectangle with rounded ends)
      ctx.fillStyle = 'white';
      ctx.beginPath();
      const fingerWidth = 12 * scale;
      const fingerHeight = 50 * scale;
      const fingerX = (size - fingerWidth) / 2;
      const fingerY = 28 * scale;
      const fingerRadius = 6 * scale;

      ctx.roundRect(fingerX, fingerY, fingerWidth, fingerHeight, fingerRadius);
      ctx.fill();

      // Mouth ellipse (white)
      ctx.beginPath();
      ctx.ellipse(size/2, 88*scale, 24*scale, 12*scale, 0, 0, Math.PI * 2);
      ctx.globalAlpha = 0.9;
      ctx.fill();
      ctx.globalAlpha = 1;

      // Inner mouth
      ctx.fillStyle = '#4f46e5';
      ctx.beginPath();
      ctx.ellipse(size/2, 88*scale, 16*scale, 6*scale, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Polyfill for roundRect if needed
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
      };
    }

    const sizes = [16, 32, 48, 128];

    sizes.forEach(size => {
      const canvas = document.getElementById('icon' + size);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);

      // Setup download link
      const link = document.getElementById('dl' + size);
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const dataUrl = canvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'icon' + size + '.png';
        a.click();
      });
    });
  </script>
</body>
</html>
